name: Docker Image Azure

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Docker image
        run: docker build -t quapioacr.azurecr.io/quadshop-api:latest .

      - name: Push Docker image to ACR
        run: |
          az acr login --name quapioacr.azurecr.io
          docker push quapioacr.azurecr.io/quadshop-api:latest