spring.datasource.url=jdbc:mysql://avnadmin:AVNS_t9hxHxOA9uO9jlrRCO5@mysql-219997a8-quadsolutions-de7b.i.aivencloud.com:25032/defaultdb?ssl-mode=REQUIRED
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SSL required by Aiven
spring.datasource.hikari.data-source-properties.sslMode=REQUIRED


# ===========================
